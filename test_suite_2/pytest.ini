[pytest]
testpaths = tests
bdd_features_base_dir = features
markers =
    live: requires a running /verify backend (set BACKEND_URL or --backend-url)
    corpus: requires data/training_corpus.jsonl (ships with this suite)
    golden: requires reference_lib golden vectors (drop into data/ if you have them)
    slow: long-running (full corpus replay)
addopts = -ra --strict-markers
